name: MKL-Q public hygiene

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  hygiene:
    name: Source-only repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Reject local and generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)(__pycache__|\.pytest_cache)(/|$)|\.pyc$|\.DS_Store$|^build(-python)?/|^benchmarks/mklq/results/|^docs/superpowers/|^(dist|wheelhouse)/|\.(whl|dmg|pkg|zip)$|\.tar\.gz$'; then
            echo "Generated, local, release, or agent-internal files are tracked."
            exit 1
          fi

      - name: Check MKL-Q public metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/run_public_healthcheck.py \
            --only-step public_metadata \
            --skip-harness-tests \
            --output benchmarks/mklq/results/public-metadata-check.json

      - name: Check public claim boundaries
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_public_claims.py

      - name: Audit public release checklist
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/run_public_release_checklist_audit.py

      - name: Audit source-only tag draft
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/run_source_release_tag_audit.py --docs-only

      - name: Audit self-hosted Apple Silicon CI readiness
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/run_self_hosted_ci_audit.py

      - name: Parse benchmark summaries and check public report paths
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_public_report_paths.py

      - name: Check clean CPU performance evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_performance_evidence.py

      - name: Check CRZ distance performance evidence
        shell: bash
        run: |
          set -euo pipefail
          required_ratios="$(python3 -c 'print(",".join(f"crz_distance_sweep_state_q20_distance_{distance}" for distance in range(1, 20)))')"
          python3 benchmarks/mklq/check_performance_evidence.py \
            --pattern '*.summary.json' \
            --summary-id local-crz-distance-sweep-cpu-q20-2026-07-01 \
            --required-ratios "${required_ratios}"

      - name: Check multi-control performance evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_performance_evidence.py \
            --pattern '*.summary.json' \
            --summary-id local-multi-control-cpu-q20-2026-06-22 \
            --required-ratios multi_control_state_q20

      - name: Check CPU scaling performance evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_performance_evidence.py \
            --pattern '*.summary.json' \
            --summary-id local-scaling-cpu-multi-control-q18-q22-2026-06-22 \
            --required-ratios multi_control_state_q18,multi_control_state_q20,multi_control_state_q22

      - name: Check sampling scaling performance evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_performance_evidence.py \
            --pattern '*.summary.json' \
            --summary-id local-sampling-scaling-cpu-q18-q22-2026-06-23 \
            --required-ratios sample_full_register_q18_1024_shots,sample_full_register_q18_65536_shots,sample_full_register_q20_1024_shots,sample_full_register_q20_65536_shots,sample_full_register_q22_1024_shots,sample_full_register_q22_65536_shots,sample_partial_register_q18_1024_shots,sample_partial_register_q18_65536_shots,sample_partial_register_q20_1024_shots,sample_partial_register_q20_65536_shots,sample_partial_register_q22_1024_shots,sample_partial_register_q22_65536_shots

      - name: Check sampling profile evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_sampling_profile_evidence.py \
            --pattern '*.summary.json' \
            --summary-id local-sampling-profile-breakdown-cpu-q20-q22-2026-06-23

      - name: Check experimental Metal evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_metal_evidence.py

      - name: Parse CPU gate counter probe
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          reports = sorted(Path("benchmarks/mklq/reports").glob("*.cpu-gate-counter.json"))
          if not reports:
              raise SystemExit("No CPU gate counter probe reports found.")
          selected = 0
          for path in reports:
              payload = json.loads(path.read_text(encoding="utf-8"))
              if payload.get("schema_version") != "mklq-cpu-gate-counter-probe-v1":
                  raise SystemExit(f"{path}: unexpected schema_version")
              if payload.get("evidence_kind") != "local_runtime_counter_probe":
                  raise SystemExit(f"{path}: unexpected evidence_kind")
              summary = payload.get("summary", {})
              if summary.get("status") != "passed":
                  raise SystemExit(f"{path}: summary is not passed")
              expected = summary.get("expected")
              selected_count = summary.get("selected")
              if not isinstance(expected, int) or expected <= 0:
                  raise SystemExit(f"{path}: expected count must be positive")
              if selected_count != expected:
                  raise SystemExit(f"{path}: selected count does not match expected")
              if summary.get("missing") != 0:
                  raise SystemExit(f"{path}: missing count is not zero")
              if summary.get("failed") != 0:
                  raise SystemExit(f"{path}: failed count is not zero")
              expected_counter_tests = payload.get("expected_counter_tests")
              if (
                  not isinstance(expected_counter_tests, list)
                  or len(expected_counter_tests) != expected
              ):
                  raise SystemExit(f"{path}: expected_counter_tests length mismatch")
              if payload.get("missing_counter_tests") != []:
                  raise SystemExit(f"{path}: missing_counter_tests must be empty")
              boundary = payload.get("boundary", {})
              if boundary.get("runtime_counter_evidence") is not True:
                  raise SystemExit(f"{path}: runtime_counter_evidence must be true")
              if boundary.get("gate_fast_path_counter_evidence") is not True:
                  raise SystemExit(f"{path}: gate_fast_path_counter_evidence must be true")
              if boundary.get("single_control_rz_phase_counter_evidence") is not True:
                  raise SystemExit(f"{path}: single_control_rz_phase_counter_evidence must be true")
              if boundary.get("release_signoff") is not False:
                  raise SystemExit(f"{path}: release_signoff must be false")
              if boundary.get("performance_benchmark") is not False:
                  raise SystemExit(f"{path}: performance_benchmark must be false")
              if boundary.get("cross_machine_performance_proof") is not False:
                  raise SystemExit(f"{path}: cross_machine_performance_proof must be false")
              tests = payload.get("tests", [])
              if len(tests) != selected_count:
                  raise SystemExit(f"{path}: selected count does not match tests")
              if [test.get("name") for test in tests] != expected_counter_tests:
                  raise SystemExit(f"{path}: test names do not match expected list")
              for test in tests:
                  if test.get("status") != "passed":
                      raise SystemExit(f"{path}: a counter test did not pass")
                  if "stdout" in test or "stderr" in test:
                      raise SystemExit(f"{path}: raw test log leaked")
              selected += len(tests)
          print(f"Parsed {len(reports)} CPU gate counter report(s), {selected} test(s).")
          PY

      - name: Check CPU gate counter docs
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_cpu_gate_counter_docs.py

      - name: Parse CPU sampling counter probe
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          reports = sorted(Path("benchmarks/mklq/reports").glob("*.cpu-counter.json"))
          if not reports:
              raise SystemExit("No CPU sampling counter probe reports found.")
          selected = 0
          for path in reports:
              payload = json.loads(path.read_text(encoding="utf-8"))
              if payload.get("schema_version") != "mklq-cpu-sampling-counter-probe-v1":
                  raise SystemExit(f"{path}: unexpected schema_version")
