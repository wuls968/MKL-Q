name: MKL-Q public hygiene

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  hygiene:
    name: Source-only repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Reject local and generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)(__pycache__|\.pytest_cache)(/|$)|\.pyc$|\.DS_Store$|^build(-python)?/|^benchmarks/mklq/results/|^docs/superpowers/|^(dist|wheelhouse)/|\.(whl|dmg|pkg|zip)$|\.tar\.gz$'; then
            echo "Generated, local, release, or agent-internal files are tracked."
            exit 1
          fi

      - name: Check MKL-Q public metadata
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'MKL-Q' README.md
          grep -q 'mklq-cpu' README.md
          grep -q 'mklq-metal' README.md
          grep -q 'source-only' README.md
          grep -q 'cudaq' README.md
          test -f docs/mklq/known-limitations.md
          test -f docs/mklq/architecture.md
          test -f docs/mklq/testing-matrix.md
          test -f docs/mklq/apple-silicon-ci.md
          test -f docs/mklq/upstream-sync.md
          test -f docs/mklq/release-policy.md
          test -f docs/mklq/public-release-checklist.md
          test -f docs/mklq/developer-workflow.md
          test -f docs/mklq/maintainer-runbook.md
          test -f docs/mklq/issue-labels.md
          test -f .github/labels.yml
          test -f docs/mklq/branch-protection.md
          test -f docs/mklq/public-readiness.md
          test -f docs/mklq/cpu-gate-counters.md
          test -f docs/mklq/cpu-sampling-counters.md
          test -f docs/mklq/metal-runtime-counters.md
          test -f .github/branch-protection-main.json
          test -f .github/workflows/mklq-apple-silicon-ci.yml
          test -f .github/pull_request_template.md
          test -f examples/mklq/README.md
          test -f examples/mklq/python/bell.py
          test -f examples/mklq/python/clifford_chain.py
          test -f examples/mklq/python/ghz.py
