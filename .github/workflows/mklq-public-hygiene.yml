              expected = summary.get("expected")
              selected_count = summary.get("selected")
              if not isinstance(expected, int) or expected <= 0:
                  raise SystemExit(f"{path}: expected count must be positive")
              if selected_count != expected:
                  raise SystemExit(f"{path}: selected count does not match expected")
              if summary.get("missing") != 0:
                  raise SystemExit(f"{path}: missing count is not zero")
              if summary.get("failed") != 0:
                  raise SystemExit(f"{path}: failed count is not zero")
              expected_counter_tests = payload.get("expected_counter_tests")
              if (
                  not isinstance(expected_counter_tests, list)
                  or len(expected_counter_tests) != expected
              ):
                  raise SystemExit(f"{path}: expected_counter_tests length mismatch")
              if payload.get("missing_counter_tests") != []:
                  raise SystemExit(f"{path}: missing_counter_tests must be empty")
              boundary = payload.get("boundary", {})
              if boundary.get("runtime_counter_evidence") is not True:
                  raise SystemExit(f"{path}: runtime_counter_evidence must be true")
              if boundary.get("sampling_phase_counter_evidence") is not True:
                  raise SystemExit(f"{path}: sampling_phase_counter_evidence must be true")
              if boundary.get("probability_fill_counter_evidence") is not True:
                  raise SystemExit(f"{path}: probability_fill_counter_evidence must be true")
              if boundary.get("release_signoff") is not False:
                  raise SystemExit(f"{path}: release_signoff must be false")
              if boundary.get("performance_benchmark") is not False:
                  raise SystemExit(f"{path}: performance_benchmark must be false")
              if boundary.get("cross_machine_performance_proof") is not False:
                  raise SystemExit(f"{path}: cross_machine_performance_proof must be false")
              tests = payload.get("tests", [])
              if len(tests) != selected_count:
                  raise SystemExit(f"{path}: selected count does not match tests")
              if [test.get("name") for test in tests] != expected_counter_tests:
                  raise SystemExit(f"{path}: test names do not match expected list")
              for test in tests:
                  if test.get("status") != "passed":
                      raise SystemExit(f"{path}: a counter test did not pass")
                  if "stdout" in test or "stderr" in test:
                      raise SystemExit(f"{path}: raw test log leaked")
              selected += len(tests)
          print(f"Parsed {len(reports)} CPU counter report(s), {selected} test(s).")
          PY

      - name: Check CPU sampling counter docs
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_cpu_sampling_counter_docs.py

      - name: Parse Metal runtime counter probe
