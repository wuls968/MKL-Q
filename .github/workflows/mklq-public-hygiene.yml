          from pathlib import Path

          banned = [
              "cuda-quantum" + "@nvidia.com",
              "github.com/NVIDIA/cuda-quantum" + "/actions",
              "nv-" + "slack",
              "ops-" + "bot",
              "copy-pr-" + "bot",
          ]
          paths = [
              Path("README.md"),
              Path("CITATION.cff"),
              Path("Contributing.md"),
              Path("SECURITY.md"),
              Path(".github/pull_request_template.md"),
              Path("examples/mklq/README.md"),
          ]
          paths.extend(Path("docs/mklq").glob("*.md"))
          paths.extend(path for path in Path(".github").rglob("*") if path.is_file())
          failures = []
          for path in paths:
              text = path.read_text(encoding="utf-8", errors="replace")
              for token in banned:
                  if token in text:
                      failures.append(f"{path}: contains {token}")
          if failures:
              raise SystemExit("\n".join(failures))
          PY

