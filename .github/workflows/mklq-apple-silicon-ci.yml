name: MKL-Q Apple Silicon correctness

on:
  workflow_dispatch:
    inputs:
      run_full_gate:
        description: Select confirm to run the full self-hosted Apple Silicon gate.
        required: true
        type: choice
        options:
          - skip
          - confirm
        default: skip
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mklq-apple-silicon-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch_guard:
    name: Dispatch guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain manual activation
        shell: bash
        run: |
          set -euo pipefail
          echo "Dispatch guard active for ${GITHUB_EVENT_NAME}."
          echo "Full Apple Silicon gate still requires workflow_dispatch run_full_gate=confirm."

  correctness:
    name: Manual Apple Silicon correctness gate
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_full_gate == 'confirm' }}
    runs-on: [self-hosted, macOS, ARM64, mklq-apple-silicon]
    timeout-minutes: 180
    env:
      MKLQ_BUILD_DIR: build-python
      MKLQ_PYTHON: /opt/anaconda3/bin/python3
    steps:
      - name: Prepare sparse source checkout
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          retry_git() {
            local label="$1"
            shift
            local attempt=1
            local max_attempts=3
            local delay_seconds=10
            while true; do
              echo "Running ${label} (attempt ${attempt}/${max_attempts})."
              if "$@"; then
                return 0
              fi
              local status="$?"
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "::error::${label} failed after ${attempt} attempts (exit ${status})." >&2
                return "${status}"
              fi
              echo "::warning::${label} failed with exit ${status}; retrying in ${delay_seconds}s." >&2
              sleep "${delay_seconds}"
              attempt=$((attempt + 1))
              delay_seconds=$((delay_seconds * 2))
            done
          }

          workspace="${GITHUB_WORKSPACE:?}"
          if [ "${workspace}" = "/" ]; then
            echo "::error::Refusing to clean filesystem root." >&2
            exit 1
          fi
          mkdir -p "${workspace}"
          find "${workspace}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

          git init "${workspace}"
          cd "${workspace}"
          git config --local gc.auto 0
          git config --local advice.detachedHead false
          git remote add origin https://github.com/wuls968/MKL-Q.git
          git remote add upstream https://github.com/NVIDIA/cuda-quantum.git
          git sparse-checkout init --cone
          git sparse-checkout set \
            .github \
            benchmarks \
            cmake \
            cudaq \
            docs/mklq \
            docs/sphinx/examples/mklq \
            docs/sphinx/targets \
            python \
            runtime \
            scripts \
            targettests \
            tpls \
            unittests \
            utils
          retry_git "origin main sparse fetch" \
            git -c http.version=HTTP/1.1 -c protocol.version=2 fetch \
            --no-tags --filter=blob:none --depth=1 \
            origin +refs/heads/main:refs/remotes/origin/main
          git checkout --force -B main origin/main

      - name: Select Python and install prefix
        shell: bash
        run: |
          set -euo pipefail
          python_bin="${MKLQ_PYTHON}"
          if [ ! -x "${python_bin}" ]; then
            python_bin="$(command -v python3)"
          fi
          install_prefix="${RUNNER_TEMP}/cudaq-mklq-install"
          {
            echo "MKLQ_EFFECTIVE_PYTHON=${python_bin}"
            echo "MKLQ_INSTALL_PREFIX=${install_prefix}"
          } >> "${GITHUB_ENV}"
          "${python_bin}" --version

      - name: Normalize Git remotes
        shell: bash
        run: |
          set -euo pipefail
          retry_git() {
            local label="$1"
            shift
            local attempt=1
            local max_attempts=3
            local delay_seconds=10
            while true; do
              echo "Running ${label} (attempt ${attempt}/${max_attempts})."
              if "$@"; then
                return 0
              fi
              local status="$?"
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "::error::${label} failed after ${attempt} attempts (exit ${status})." >&2
                return "${status}"
              fi
              echo "::warning::${label} failed with exit ${status}; retrying in ${delay_seconds}s." >&2
              sleep "${delay_seconds}"
              attempt=$((attempt + 1))
              delay_seconds=$((delay_seconds * 2))
            done
          }

          git remote set-url origin https://github.com/wuls968/MKL-Q.git
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/NVIDIA/cuda-quantum.git
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            retry_git "origin main unshallow" \
              git -c http.version=HTTP/1.1 -c protocol.version=2 fetch \
              --no-tags --filter=blob:none --unshallow \
              origin +refs/heads/main:refs/remotes/origin/main
          else
            retry_git "origin main fetch" \
              git -c http.version=HTTP/1.1 -c protocol.version=2 fetch \
              --no-tags --filter=blob:none \
              origin +refs/heads/main:refs/remotes/origin/main
          fi
          retry_git "upstream main fetch" \
            git -c http.version=HTTP/1.1 -c protocol.version=2 fetch \
            --no-tags --filter=blob:none \
            upstream +refs/heads/main:refs/remotes/upstream/main
          if ! git rev-parse --verify main >/dev/null 2>&1; then
            git branch main origin/main
          elif [ "$(git rev-parse main)" != "$(git rev-parse origin/main)" ]; then
            if [ "$(git branch --show-current)" = "main" ]; then
              echo "Local main is checked out but does not match origin/main." >&2
              exit 1
            fi
            git branch --force main origin/main
          fi
          git remote -v
          git rev-parse main origin/main upstream/main

      - name: Show runner context
        shell: bash
        run: |
          set -euo pipefail
          uname -a
          sw_vers
          "${MKLQ_EFFECTIVE_PYTHON}" --version
          cmake --version
          ninja --version

      - name: Verify source checkout
        shell: bash
        run: |
          set -euo pipefail
          git status --short --branch
          test "$(git rev-parse --is-shallow-repository)" = "false"
          git ls-files .github/workflows | sort

      - name: Bootstrap source submodules
        shell: bash
        timeout-minutes: 20
        run: |
          set -euo pipefail
          retry_git() {
            local label="$1"
            shift
            local attempt=1
            local max_attempts=3
            local delay_seconds=10
            while true; do
              echo "Running ${label} (attempt ${attempt}/${max_attempts})."
              if "$@"; then
                return 0
              fi
              local status="$?"
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "::error::${label} failed after ${attempt} attempts (exit ${status})." >&2
                return "${status}"
              fi
              echo "::warning::${label} failed with exit ${status}; retrying in ${delay_seconds}s." >&2
              sleep "${delay_seconds}"
              attempt=$((attempt + 1))
              delay_seconds=$((delay_seconds * 2))
            done
          }

          retry_git "submodule sync" git submodule sync --recursive
          retry_git "non-LLVM submodule bootstrap" \
            git -c submodule.tpls/llvm.update=none submodule update \
            --init \
            --depth 1 \
            --jobs 6 \
            tpls/Stim \
            tpls/armadillo \
            tpls/cpr \
            tpls/eigen \
            tpls/ensmallen \
            tpls/fmt \
            tpls/googletest-src \
            tpls/nanobind \
            tpls/qpp \
            tpls/spdlog \
            tpls/xtensor \
            tpls/xtl
          retry_git "nanobind robin_map submodule bootstrap" \
            git -C tpls/nanobind submodule update \
            --init \
            --depth 1 \
            ext/robin_map
          git submodule status --recursive

      - name: Reset local build state
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${MKLQ_BUILD_DIR}" "${MKLQ_INSTALL_PREFIX}"
          mkdir -p "$(dirname "${MKLQ_INSTALL_PREFIX}")"

      - name: Configure MKL-Q build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B "${MKLQ_BUILD_DIR}" -G Ninja \
            -D CUDAQ_ENABLE_MKLQ_BACKEND=ON \
            -D CUDAQ_ENABLE_PROJECTS=python \
            -D GIT_SUBMODULE=OFF \
            -D CMAKE_INSTALL_PREFIX="${MKLQ_INSTALL_PREFIX}" \
            -D Python_EXECUTABLE="${MKLQ_EFFECTIVE_PYTHON}" \
            -D Python3_EXECUTABLE="${MKLQ_EFFECTIVE_PYTHON}"

      - name: Run full MKL-Q local healthcheck
        shell: bash
        run: |
          set -euo pipefail
          "${MKLQ_EFFECTIVE_PYTHON}" benchmarks/mklq/run_public_healthcheck.py \
            --full \
            --require-clean \
            --focused-install-build \
            --install-prefix "${MKLQ_INSTALL_PREFIX}" \
            --python-executable "${MKLQ_EFFECTIVE_PYTHON}" \
            --pythonpath "${MKLQ_INSTALL_PREFIX}" \
            --nvqpp "${MKLQ_INSTALL_PREFIX}/bin/nvq++" \
            --build-dir "${MKLQ_BUILD_DIR}" \
            --jobs 6 \
            --timeout-seconds 1800 \
            --output "benchmarks/mklq/results/apple-silicon-ci-${GITHUB_RUN_ID}.json"
